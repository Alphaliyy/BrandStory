<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Story - Banner</title>
    <style>
        /* 基础样式复位 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .banner-container {
            width: 100%;
            max-width: 1200px; /* 限制网页最大宽度 */
            padding: 20px;
            text-align: center;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* 💻 电脑端/平板样式 (屏幕宽度大于 768px 时) */
        @media (min-width: 769px) {
            .mobile-banner {
                display: none; /* 隐藏手机端图片 */
            }
            .desktop-banner {
                display: block; /* 显示电脑端图片 */
            }
        }

        /* 📱 手机端样式 (屏幕宽度小于或等于 768px 时) */
        @media (max-width: 768px) {
            .desktop-banner {
                display: none; /* 隐藏电脑端图片 */
            }
            .mobile-banner {
                display: block; /* 显示手机端图片 */
            }
            .banner-container {
                padding: 10px; /* 手机端缩小边距 */
            }
            .banner-img {
                border-radius: 8px; /* 手机端圆角稍微变小 */
            }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <!-- 电脑端 Banner -->
        <img class="banner-img desktop-banner" 
             src="https://raw.githubusercontent.com/Alphaliyy/BrandStory/main/desktop_banner.png" 
             alt="Desktop Banner">

        <!-- 手机端 Banner (根据你上一个提问的路径拼接) -->
        <img class="banner-img mobile-banner" 
             src="https://raw.githubusercontent.com/Alphaliyy/BrandStory/main/mobile_banner.jpg" 
             alt="Mobile Banner">
    </div>

</body>
</html>
