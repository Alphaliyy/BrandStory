<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; overflow: hidden; background: transparent; }
        .banner-box { width: 100%; position: relative; }
        .banner-img { width: 100%; height: auto; display: block; }
        
        /* 默认显示电脑端图片 */
        .pc-img { display: block; }
        .mobile-img { display: none; }

        /* 当屏幕小于等于 768px 时切换为手机端图片 */
        @media (max-width: 768px) {
            .pc-img { display: none; }
            .mobile-img { display: block; }
        }
    </style>
</head>
<body>

    <div class="banner-box">
        <!-- 电脑端大图 -->
        <img src="/static/upload/image/20260704/1783176235657394.webp" class="banner-img pc-img" alt="电脑端大图">
        <!-- 手机端小图 -->
        <img src="/static/upload/image/20260704/1783176739890346.webp" class="banner-img mobile-img" alt="手机端小图">
    </div>

</body>
</html>
