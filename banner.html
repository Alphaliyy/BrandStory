<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        .banner-box { width: 100%; width: 100vw; }
        .banner-img { width: 100%; height: auto; display: block; }
        
        /* 默认显示电脑端图片 */
        .pc-img { display: block; }
        .mobile-img { display: none; }

        /* 当屏幕小于等于 768px 时切换为手机端图片 */
        @media (max-width: 768px) {
            .pc-img { display: none; }
            .mobile-img { display: block; }
        }
    </style>
</head>
<body>

    <div class="banner-box">
        <!-- 电脑端大图（请将下面的 https://你的github用户名... 替换为你真实的 GitHub 图片直链地址） -->
        <img src="https://raw.githubusercontent.com/你的github用户名/你的仓库名/main/desktop_banner.png" class="banner-img pc-img" alt="Desktop Banner">
        
        <!-- 手机端小图（请将下面的 https://你的github用户名... 替换为你真实的 GitHub 图片直链地址） -->
        <img src="https://raw.githubusercontent.com/你的github用户名/你的仓库名/main/mobile_banner.png" class="banner-img mobile-img" alt="Mobile Banner">
    </div>

</body>
</html>
